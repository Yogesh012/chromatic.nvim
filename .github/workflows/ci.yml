name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ plugin/ tests/ --codes

  test:
    name: Tests (busted)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Install LuaJIT + busted
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit luarocks
          # Install busted targeting Lua 5.1 (LuaJIT ABI) so nvim's embedded
          # LuaJIT can require it via the paths added in tests/init.lua.
          sudo luarocks --lua-version 5.1 install busted

      - name: Run tests
        run: |
          nvim --headless -u tests/init.lua \
            -c "lua _G.arg={[0]='busted'} require('busted.runner')()"
